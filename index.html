<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROK</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="side-top">
        <div class="brand">ROK</div>
        <button id="newChatBtn" class="side-btn">+ New chat</button>
      </div>

      <div class="side-section">
        <div class="side-title">Today</div>
        <div class="side-item active">Local session</div>
      </div>

      <div class="side-footer">Nothing is saved!</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="top-left">
          <div class="title">ROK</div>
          <div class="pill">Made with ❤️ from MrGuineaBird</div>
        </div>
        <button id="clearBtn" class="ghost">Clear</button>
      </header>

      <main id="chat" class="chat"></main>

      <div class="composer">
        <input id="input" placeholder="Message ROK..." autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
      <div class="composer-hint">ROK can make mistakes. Check important info.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
