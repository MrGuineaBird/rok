<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Desmos | Graphing Calculator</title>
  <link rel="icon" href="https://www.desmos.com/favicon.ico" />
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    #desmosContainer {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .desmos-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      padding: 0 12px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      user-select: none;
    }

    .desmos-topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 180px;
    }

    .desmos-topbar-folder-icon {
      color: #aaa;
      font-size: 16px;
      line-height: 1;
    }

    .desmos-topbar-divider {
      width: 1px;
      height: 20px;
      background: #444;
      margin: 0 4px;
    }

    .desmos-topbar-title {
      color: #ccc;
      font-size: 13px;
      font-weight: 400;
      background: none;
      border: none;
      outline: none;
      cursor: text;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .desmos-topbar-title:hover {
      background: rgba(255,255,255,0.08);
    }

    .desmos-topbar-save {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid #555;
      background: transparent;
      color: #bbb;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .desmos-topbar-save:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .desmos-topbar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 300;
      color: #ccc;
      letter-spacing: 2px;
      pointer-events: none;
    }

    .desmos-topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 180px;
      justify-content: flex-end;
    }

    .desmos-topbar-login {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid #555;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .desmos-topbar-login:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .desmos-topbar-signup {
      padding: 4px 12px;
      border-radius: 4px;
      border: none;
      background: #2d70b3;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .desmos-topbar-signup:hover {
      background: #3580c3;
    }

    .desmos-topbar-icons {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 8px;
      color: #999;
      font-size: 15px;
    }

    .desmos-topbar-icon {
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
      line-height: 1;
    }

    .desmos-topbar-icon:hover { opacity: 1; }

    /* -- Secret ROK button - tiny, blends into corner -- */
    .rok-secret-btn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 9999;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: rgba(180, 180, 180, 0.18);
      color: rgba(150, 150, 150, 0.5);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    /* Only reveals itself on hover */
    .rok-secret-btn:hover {
      background: rgba(209, 75, 75, 0.15);
      color: #d14b4b;
    }

    .rok-secret-btn.is-active {
      background: rgba(209, 75, 75, 0.2);
      color: #d14b4b;
    }

    /* -- Chat drawer - dark ROK style -- */
    .rok-chat-drawer {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 340px;
      height: 440px;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      border: 1px solid #3a1f24;
      border-radius: 14px 0 0 0;
      background: rgba(13, 15, 20, 0.98);
      backdrop-filter: blur(12px);
      box-shadow: -4px -4px 28px rgba(0,0,0,0.45);
      animation: drawer-in 0.2s ease both;
    }

    .rok-chat-drawer[hidden] { display: none; }

    @keyframes drawer-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rok-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #2b3343;
      flex-shrink: 0;
    }

    .rok-drawer-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #f3ecec;
      font-family: "Segoe UI", sans-serif;
    }

    .rok-drawer-title img {
      height: 18px;
      width: auto;
    }

    .rok-drawer-close {
      background: none;
      border: none;
      color: #bea9a9;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    .rok-drawer-close:hover { color: #f3ecec; }

    .rok-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      font-family: "Segoe UI", sans-serif;
    }

    .rok-msg {
      max-width: 88%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.55;
    }

    .rok-msg-user {
      align-self: flex-end;
      background: rgba(209,75,75,0.2);
      border: 1px solid rgba(209,75,75,0.38);
      color: #f3ecec;
    }

    .rok-msg-bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      color: #decccc;
    }

    .rok-msg.markdown {
      padding: 10px 12px;
    }

    .rok-msg.markdown h1,
    .rok-msg.markdown h2,
    .rok-msg.markdown h3,
    .rok-msg.markdown h4 {
      margin: 0 0 0.55em;
      color: #f5e7e7;
      font-size: 1em;
    }

    .rok-msg.markdown p {
      margin: 0 0 0.75em;
    }

    .rok-msg.markdown p:last-child {
      margin-bottom: 0;
    }

    .rok-msg.markdown ul,
    .rok-msg.markdown ol {
      margin: 0 0 0.75em;
      padding-left: 1.2em;
    }

    .rok-msg.markdown li {
      margin-bottom: 0.25em;
    }

    .rok-msg.markdown a {
      color: #ffb5b5;
    }

    .rok-msg.markdown code {
      padding: 0.14em 0.34em;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #ffe4e4;
      font-family: "Consolas", "IBM Plex Mono", monospace;
      font-size: 0.92em;
    }

    .rok-msg.markdown pre {
      margin: 0 0 0.75em;
      padding: 10px 12px;
      border-radius: 10px;
      background: #090c12;
      color: #f7f0f0;
      overflow-x: auto;
    }

    .rok-msg.markdown pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }

    .rok-msg.markdown blockquote {
      margin: 0 0 0.75em;
      padding-left: 10px;
      border-left: 3px solid rgba(209, 75, 75, 0.5);
      color: #d5b8b8;
    }

    .rok-msg.markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 0.75em;
      font-size: 0.95em;
    }

    .rok-msg.markdown th,
    .rok-msg.markdown td {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 8px;
      text-align: left;
    }

    .rok-msg.markdown th {
      background: rgba(255,255,255,0.08);
    }

    .rok-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #2b3343;
      flex-shrink: 0;
    }

    .rok-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid #3a1f24;
      border-radius: 8px;
      color: #f3ecec;
      font-size: 13px;
      padding: 8px 10px;
      font-family: "Segoe UI", sans-serif;
      outline: none;
    }

    .rok-input:focus { border-color: #d14b4b; }

    .rok-send {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #562a2a;
      background: linear-gradient(135deg, #cb2d2d 0%, #931717 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Segoe UI", sans-serif;
    }

    .rok-send:hover { filter: brightness(1.1); }
  </style>
</head>
<body>

  <header class="desmos-topbar">
    <div class="desmos-topbar-left">
      <span class="desmos-topbar-folder-icon">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>

  <script>
    function getStoredApiBase() {
      try {
        return localStorage.getItem("rok_api_base") || localStorage.getItem("apiBase") || "";
      } catch {
        return "";
      }
    }

    const runtimeConfig = (typeof window !== "undefined" && window.ROK_CONFIG) ? window.ROK_CONFIG : {};
    const runtimeApiBase =
      (typeof window !== "undefined" && typeof window.ROK_API_BASE === "string") ? window.ROK_API_BASE : "";
    const runtimeHost =
      (typeof window !== "undefined" && window.location && window.location.hostname)
        ? String(window.location.hostname).toLowerCase()
        : "";
    const defaultApiBase =
      (runtimeHost === "127.0.0.1" || runtimeHost === "localhost" || runtimeHost === "::1")
        ? ""
        : "https://rokbackendreal.kyklos.online";
    const ROK_API_BASE = String(
      runtimeApiBase ||
      runtimeConfig.apiBase ||
      getStoredApiBase() ||
      defaultApiBase
    ).trim().replace(/\/+$/, "");

    const API_URL = ROK_API_BASE + "/api/chat";
    const AUTH_SESSION_URL = ROK_API_BASE + "/api/auth/session";
    const MATH_CHAT_MODEL = "gpt-oss:120b-cloud";
    const hasMarked = typeof marked !== "undefined";
    const hasKaTeX = typeof katex !== "undefined";
    const hasDOMPurify = typeof DOMPurify !== "undefined";
    let serverSessionReady = null;

    if (hasMarked) {
      marked.setOptions({ breaks: true, gfm: true });
    }

    function ensureServerSession() {
      if (serverSessionReady) {
        return serverSessionReady;
      }
      serverSessionReady = fetch(AUTH_SESSION_URL, {
        method: "GET",
        cache: "no-store",
        credentials: "include",
        headers: {
          Accept: "application/json"
        }
      }).catch(() => {
        // The standalone page can still attempt a chat even if session bootstrap fails.
      });
      return serverSessionReady;
    }

    async function fetchWithSession(url, options = {}) {
      const requestOptions = { ...options, credentials: options.credentials ?? "include" };
      return fetch(url, requestOptions);
    }

    async function safeReadText(response) {
      if (!response) return "";
      try {
        return await response.text();
      } catch {
        return "";
      }
    }

    function extractReplyFromPayload(rawPayload = "") {
      const raw = String(rawPayload || "").trim();
      if (!raw) return { token: "", done: false, error: "" };
      if (raw === "[DONE]") return { token: "", done: true, error: "" };
      if (raw[0] !== "{") return { token: raw, done: false, error: "" };

      try {
        const parsed = JSON.parse(raw);
        const error = typeof parsed.error === "string" ? parsed.error : "";
        for (const key of ["token", "response", "reply", "text", "message", "content"]) {
          if (typeof parsed[key] === "string") {
            return { token: parsed[key], done: Boolean(parsed.done), error };
          }
        }
        if (parsed.message && typeof parsed.message === "object" && typeof parsed.message.content === "string") {
          return { token: parsed.message.content, done: Boolean(parsed.done), error };
        }
        if (Array.isArray(parsed.choices)) {
          const joined = parsed.choices.map((choice) => {
            if (!choice || typeof choice !== "object") return "";
            if (typeof choice.text === "string") return choice.text;
            if (choice.delta && typeof choice.delta === "object" && typeof choice.delta.content === "string") {
              return choice.delta.content;
            }
            if (choice.message && typeof choice.message === "object" && typeof choice.message.content === "string") {
              return choice.message.content;
            }
            return "";
          }).join("");
          return { token: joined, done: Boolean(parsed.done), error };
        }
        return { token: "", done: Boolean(parsed.done), error };
      } catch {
        return { token: raw, done: false, error: "" };
      }
    }

    async function readChatReply(response, options = {}) {
      const contentType = (response.headers.get("content-type") || "").toLowerCase();
      if (!response.ok) {
        const bodyText = await safeReadText(response);
        try {
          const parsed = JSON.parse(bodyText || "{}");
          throw new Error(parsed.error || parsed.reply || bodyText || `Request failed (${response.status})`);
        } catch (error) {
          if (error instanceof Error && error.message && error.message !== "Unexpected end of JSON input") {
            throw error;
          }
          throw new Error(bodyText || `Request failed (${response.status})`);
        }
      }

      const reader = response.body && response.body.getReader ? response.body.getReader() : null;
      if (!reader) {
        return safeReadText(response);
      }

      const decoder = new TextDecoder("utf-8");
      const isEventStream = contentType.includes("text/event-stream");
      const isJsonLines = !isEventStream && (contentType.includes("json") || contentType.includes("ndjson"));
      const onToken = options && typeof options.onToken === "function" ? options.onToken : null;
      let buffer = "";
      let plainBuffer = "";
      let reply = "";
      let done = false;

      const appendParsedPayload = (payload) => {
        const parsed = extractReplyFromPayload(payload);
        if (parsed.error) {
          throw new Error(parsed.error);
        }
        if (parsed.token) {
          reply += parsed.token;
          if (onToken) {
            onToken(reply, parsed.token);
          }
        }
        if (parsed.done) {
          done = true;
        }
      };

      const flushEventBuffer = () => {
        let index;
        while ((index = buffer.indexOf("\n")) >= 0) {
          let line = buffer.slice(0, index);
          buffer = buffer.slice(index + 1);
          if (line.endsWith("\r")) line = line.slice(0, -1);
          if (!line || line.startsWith(":") || !line.startsWith("data:")) continue;
          appendParsedPayload(line.slice(5).trim());
          if (done) return;
        }
      };

      const flushPlainBuffer = (flushRemainder = false) => {
        let index;
        while ((index = plainBuffer.indexOf("\n")) >= 0) {
          let line = plainBuffer.slice(0, index);
          plainBuffer = plainBuffer.slice(index + 1);
          if (line.endsWith("\r")) line = line.slice(0, -1);
          if (!line.trim()) continue;
          appendParsedPayload(line.trim());
          if (done) return;
        }
        if (!flushRemainder) return;
        const remainder = plainBuffer.trim();
        plainBuffer = "";
        if (remainder) {
          appendParsedPayload(remainder);
        }
      };

      while (true) {
        const { value, done: streamDone } = await reader.read();
        if (streamDone) break;
        const chunk = decoder.decode(value, { stream: true });
        if (!chunk) continue;
        if (isEventStream) {
          buffer += chunk;
          flushEventBuffer();
        } else if (isJsonLines) {
          plainBuffer += chunk;
          flushPlainBuffer(false);
        } else {
          reply += chunk;
        }
        if (done) break;
      }

      const tail = decoder.decode();
      if (tail) {
        if (isEventStream) {
          buffer += tail;
          flushEventBuffer();
        } else if (isJsonLines) {
          plainBuffer += tail;
          flushPlainBuffer(true);
        } else {
          reply += tail;
        }
      } else if (isJsonLines) {
        flushPlainBuffer(true);
      }

      return reply.trim();
    }

    function renderKatexInElement(el) {
      if (!hasKaTeX || !el || typeof window.renderMathInElement !== "function") return;
      try {
        window.renderMathInElement(el, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "\\[", right: "\\]", display: true },
            { left: "$", right: "$", display: false },
            { left: "\\(", right: "\\)", display: false }
          ],
          throwOnError: false
        });
      } catch {}
    }

    function protectMathForMarked(text) {
      var mathBlocks = [];
      var codeProtected = String(text || "").replace(/```[\s\S]*?```|`[^`]+`/g, function (m) {
        var idx = mathBlocks.length;
        mathBlocks.push(m);
        return "%%MATH_PLACEHOLDER_" + idx + "%%";
      });
      codeProtected = codeProtected.replace(/\$\$([\s\S]+?)\$\$/g, function (m) {
        var idx = mathBlocks.length;
        mathBlocks.push(m);
        return "%%MATH_PLACEHOLDER_" + idx + "%%";
      });
      codeProtected = codeProtected.replace(/\\\[([\s\S]+?)\\\]/g, function (m) {
        var idx = mathBlocks.length;
        mathBlocks.push(m);
        return "%%MATH_PLACEHOLDER_" + idx + "%%";
      });
      codeProtected = codeProtected.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)\$(?!\$)/g, function (m) {
        var idx = mathBlocks.length;
        mathBlocks.push(m);
        return "%%MATH_PLACEHOLDER_" + idx + "%%";
      });
      codeProtected = codeProtected.replace(/\\\(([\s\S]+?)\\\)/g, function (m) {
        var idx = mathBlocks.length;
        mathBlocks.push(m);
        return "%%MATH_PLACEHOLDER_" + idx + "%%";
      });
      return { text: codeProtected, mathBlocks: mathBlocks };
    }

    function restoreMathAfterMarked(html, mathBlocks) {
      if (!mathBlocks.length) return html;
      return html.replace(/%%MATH_PLACEHOLDER_(\d+)%%/g, function (m, idxStr) {
        var idx = parseInt(idxStr, 10);
        if (idx >= 0 && idx < mathBlocks.length) {
          return mathBlocks[idx].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        return m;
      });
    }

    function renderRokMessage(el, text, markdown) {
      if (!el) return;
      if (markdown && hasMarked) {
        var mathProtected = hasKaTeX ? protectMathForMarked(text) : null;
        var rawHtml = marked.parse(mathProtected ? mathProtected.text : String(text || ""));
        if (mathProtected) {
          rawHtml = restoreMathAfterMarked(rawHtml, mathProtected.mathBlocks);
        }
        var cleanHtml = hasDOMPurify ? DOMPurify.sanitize(rawHtml) : rawHtml;
        el.classList.add("markdown");
        el.innerHTML = cleanHtml;
        renderKatexInElement(el);
        el.querySelectorAll("a[href]").forEach(function (link) {
          link.setAttribute("target", "_blank");
          link.setAttribute("rel", "noopener noreferrer");
        });
      } else {
        el.classList.remove("markdown");
        el.textContent = String(text || "");
      }
    }

    function resizeDesmos() {
      const el = document.getElementById("desmosContainer");
      if (el) {
        el.style.width = window.innerWidth + "px";
        el.style.height = (window.innerHeight - 40) + "px";
      }
    }

    // Init Desmos - light theme, full features, looks exactly like desmos.com
    let calculator = null;
    window.addEventListener("DOMContentLoaded", () => {
      const el = document.getElementById("desmosContainer");
      resizeDesmos();
      if (typeof Desmos !== "undefined" && el) {
        calculator = Desmos.GraphingCalculator(el, {
          keypad: true,
          expressions: true,
          settingsMenu: true,
          zoomButtons: true,
          border: false,
          lockViewport: false
        });
      }
    });
    window.addEventListener("resize", resizeDesmos);

    // Secret button toggle
    const secretBtn = document.getElementById("rokSecretBtn");
    const drawer = document.getElementById("rokDrawer");
    const closeBtn = document.getElementById("rokDrawerClose");
    const msgs = document.getElementById("rokMsgs");
    const input = document.getElementById("rokInput");
    const sendBtn = document.getElementById("rokSend");
    let open = false;
    const DESMOS_PLOT_COLOR = "#2d70b3";
    const MATH_GRAPH_REQUEST_PATTERN = /\b(graph|plot|draw|sketch|visuali[sz]e|chart|show(?: me)?(?: the)? graph|put (?:it|this|that) on (?:the )?graph)\b/i;
    const MATH_NON_GRAPH_QUESTION_PATTERN = /\b(what|what's|how|why|explain|find|solve|compare|different|difference|intercept|slope|domain|range|factor|simplify|evaluate|calculate|compute|mean|average)\b/i;

    function stripMathGraphDirective(reply = "") {
      return String(reply || "").replace(/\n?\s*GRAPH:\s*[^\n]+/i, "").trim();
    }

    function looksLikeBareGraphExpression(text = "") {
      const value = String(text || "").trim();
      if (!value || value.length > 120 || value.includes("?")) return false;
      if (MATH_NON_GRAPH_QUESTION_PATTERN.test(value)) return false;

      const normalized = value.replace(/\u03b8/gi, "theta");
      const hasVariable = /\b(?:x|y|t|theta)\b/i.test(normalized);
      const hasMathStructure = /[=^]/.test(normalized) || /[+\-*/]/.test(normalized) || /\b(?:sin|cos|tan|log|ln|sqrt|abs)\b/i.test(normalized);
      const strippedKnownTokens = normalized
        .replace(/\b(?:sin|cos|tan|log|ln|sqrt|abs|pi|e|x|y|t|theta)\b/gi, "")
        .replace(/[0-9+\-*/^=().,\s|]/g, "");

      return hasVariable && hasMathStructure && strippedKnownTokens.length === 0;
    }

    function shouldGraphMathRequest(text = "") {
      const value = String(text || "").trim();
      if (!value) return false;
      return MATH_GRAPH_REQUEST_PATTERN.test(value) || looksLikeBareGraphExpression(value);
    }

    function extractSimpleMathExpression(text = "") {
      let candidate = String(text || "")
        .trim()
        .replace(/^what(?:'s| is)\s+/i, "")
        .replace(/^(?:please\s+)?(?:calculate|compute|evaluate)\s+/i, "")
        .replace(/\?+$/g, "")
        .replace(/,+/g, "");

      if (!candidate) return "";
      if (shouldGraphMathRequest(candidate)) return "";
      if (/\b(?:x|y|t|theta|\u03b8)\b/i.test(candidate)) return "";
      if (!/[0-9)]/.test(candidate)) return "";
      if (!/^[0-9+\-*/().,%^\sA-Za-z]+$/.test(candidate)) return "";

      const remainingLetters = candidate.replace(/\b(?:sqrt|abs|ceil|floor|round|sin|cos|tan|log|pi|e)\b/gi, "").replace(/[^A-Za-z]/g, "");
      return remainingLetters ? "" : candidate;
    }

    function tryAnswerSimpleMathLocally(text = "") {
      const expression = extractSimpleMathExpression(text);
      if (!expression) return "";

      const safeExpr = expression
        .replace(/\^/g, "**")
        .replace(/sqrt\(/gi, "Math.sqrt(")
        .replace(/abs\(/gi, "Math.abs(")
        .replace(/ceil\(/gi, "Math.ceil(")
        .replace(/floor\(/gi, "Math.floor(")
        .replace(/round\(/gi, "Math.round(")
        .replace(/sin\(/gi, "Math.sin(")
        .replace(/cos\(/gi, "Math.cos(")
        .replace(/tan\(/gi, "Math.tan(")
        .replace(/log\(/gi, "Math.log(")
        .replace(/\bpi\b/gi, "Math.PI")
        .replace(/\be\b/g, "Math.E");

      try {
        const result = new Function("return (" + safeExpr + ")")();
        if (typeof result !== "number" || !isFinite(result)) return "";
        const formatted = Number.isInteger(result) ? String(result) : Number(result.toPrecision(12)).toString();
        return `${expression} = ${formatted}`;
      } catch {
        return "";
      }
    }

    function toggleDrawer(next) {
      open = next;
      drawer.hidden = !open;
      secretBtn.classList.toggle("is-active", open);
      if (open) input.focus();
    }

    function scrollMsgsToBottom() {
      msgs.scrollTop = msgs.scrollHeight;
    }

    function waitForMathReveal(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function animateMathReply(el, finalText) {
      const text = String(finalText || "");
      if (!text) return;
      const prefersReducedMotion =
        typeof window.matchMedia === "function" &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (prefersReducedMotion || text.length < 24) {
        renderRokMessage(el, text, true);
        scrollMsgsToBottom();
        return;
      }

      const chunkSize = text.length > 800 ? 18 : text.length > 300 ? 12 : 8;
      for (let index = chunkSize; index < text.length; index += chunkSize) {
        renderRokMessage(el, text.slice(0, index), false);
        scrollMsgsToBottom();
        await waitForMathReveal(18);
      }
      renderRokMessage(el, text, true);
      scrollMsgsToBottom();
    }

    secretBtn.addEventListener("click", () => toggleDrawer(!open));
    closeBtn.addEventListener("click", () => toggleDrawer(false));

    async function sendMsg() {
      const text = input.value.trim();
      if (!text) return;
      const graphRequested = shouldGraphMathRequest(text);
      const localMathAnswer = graphRequested ? "" : tryAnswerSimpleMathLocally(text);
      input.value = "";

      const userEl = document.createElement("div");
      userEl.className = "rok-msg rok-msg-user";
      userEl.textContent = text;
      msgs.appendChild(userEl);

      const botEl = document.createElement("div");
      botEl.className = "rok-msg rok-msg-bot";
      renderRokMessage(botEl, "Thinking...", false);
      msgs.appendChild(botEl);
      scrollMsgsToBottom();

      if (localMathAnswer) {
        renderRokMessage(botEl, localMathAnswer, false);
        scrollMsgsToBottom();
        return;
      }

      try {
        await ensureServerSession();
        const prompt = `You are a helpful math assistant inside a Desmos graphing calculator.

User request: "${text}"
Graph requested: ${graphRequested ? "yes" : "no"}

Rules:
- Answer the user's question directly and clearly before anything else.
- Only end your response with a line in the exact format GRAPH: <expression> if the user explicitly asked to graph or plot something, or if the user's input is only a bare graph expression.
- Do not include GRAPH for simple arithmetic, explanations, definitions, or questions that can be answered normally without plotting.
- If a graph might help but the user did not ask for one, mention that briefly but do not include a GRAPH line.
- If you include GRAPH, provide exactly one valid Desmos expression and nothing else on that line.`;

        const res = await fetchWithSession(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: prompt,
            history: [],
            model: MATH_CHAT_MODEL,
            max_tokens: 400,
            enable_thinking: false
          })
        });
        let streamUpdateCount = 0;
        const reply = await readChatReply(res, {
          onToken(answer) {
            streamUpdateCount += 1;
            const liveReply = stripMathGraphDirective(answer).trim();
            renderRokMessage(botEl, liveReply || "Thinking...", false);
            scrollMsgsToBottom();
          }
        });

        const graphMatch = graphRequested ? reply.match(/GRAPH:\s*(.+)/i) : null;
        if (graphMatch && calculator) {
          const latex = graphMatch[1].trim();
          calculator.setExpression({ id: "g" + Date.now(), latex, color: DESMOS_PLOT_COLOR });
          const note = document.createElement("div");
          note.className = "rok-msg rok-msg-bot";
          note.textContent = "Graphed: " + latex;
          msgs.appendChild(note);
        }

        const finalReply = stripMathGraphDirective(reply) || (graphMatch ? "Graphed it." : "Done.");
        if (streamUpdateCount <= 1 && finalReply) {
          await animateMathReply(botEl, finalReply);
        } else {
          renderRokMessage(botEl, finalReply, true);
          scrollMsgsToBottom();
        }
      } catch (err) {
        renderRokMessage(botEl, "Error: " + err.message, false);
        scrollMsgsToBottom();
      }
    }

    sendBtn.addEventListener("click", sendMsg);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMsg(); });
    window.addEventListener("keydown", (e) => {
      const isAltPress =
        e.key === "Alt" ||
        e.key === "AltGraph" ||
        e.code === "AltLeft" ||
        e.code === "AltRight" ||
        (typeof e.getModifierState === "function" && e.getModifierState("Alt") && e.key !== "Tab");
      if (!isAltPress || !open) return;
      e.preventDefault();
      toggleDrawer(false);
    }, true);
  </script>
</body>
</html>
