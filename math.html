<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Desmos | Graphing Calculator</title>
  <link rel="icon" href="https://www.desmos.com/favicon.ico" />
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    #desmosContainer {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .desmos-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      padding: 0 12px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      user-select: none;
    }

    .desmos-topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 180px;
    }

    .desmos-topbar-folder-icon {
      color: #aaa;
      font-size: 16px;
      line-height: 1;
    }

    .desmos-topbar-divider {
      width: 1px;
      height: 20px;
      background: #444;
      margin: 0 4px;
    }

    .desmos-topbar-title {
      color: #ccc;
      font-size: 13px;
      font-weight: 400;
      background: none;
      border: none;
      outline: none;
      cursor: text;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .desmos-topbar-title:hover {
      background: rgba(255,255,255,0.08);
    }

    .desmos-topbar-save {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid #555;
      background: transparent;
      color: #bbb;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .desmos-topbar-save:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .desmos-topbar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 300;
      color: #ccc;
      letter-spacing: 2px;
      pointer-events: none;
    }

    .desmos-topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 180px;
      justify-content: flex-end;
    }

    .desmos-topbar-login {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid #555;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .desmos-topbar-login:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .desmos-topbar-signup {
      padding: 4px 12px;
      border-radius: 4px;
      border: none;
      background: #2d70b3;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .desmos-topbar-signup:hover {
      background: #3580c3;
    }

    .desmos-topbar-icons {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 8px;
      color: #999;
      font-size: 15px;
    }

    .desmos-topbar-icon {
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
      line-height: 1;
    }

    .desmos-topbar-icon:hover { opacity: 1; }

    /* -- Secret ROK button - tiny, blends into corner -- */
    .rok-secret-btn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 9999;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: rgba(180, 180, 180, 0.18);
      color: rgba(150, 150, 150, 0.5);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    /* Only reveals itself on hover */
    .rok-secret-btn:hover {
      background: rgba(209, 75, 75, 0.15);
      color: #d14b4b;
    }

    .rok-secret-btn.is-active {
      background: rgba(209, 75, 75, 0.2);
      color: #d14b4b;
    }

    /* -- Chat drawer - dark ROK style -- */
    .rok-chat-drawer {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 340px;
      height: 440px;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      border: 1px solid #3a1f24;
      border-radius: 14px 0 0 0;
      background: rgba(13, 15, 20, 0.98);
      backdrop-filter: blur(12px);
      box-shadow: -4px -4px 28px rgba(0,0,0,0.45);
      animation: drawer-in 0.2s ease both;
    }

    .rok-chat-drawer[hidden] { display: none; }

    @keyframes drawer-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rok-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #2b3343;
      flex-shrink: 0;
    }

    .rok-drawer-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #f3ecec;
      font-family: "Segoe UI", sans-serif;
    }

    .rok-drawer-title img {
      height: 18px;
      width: auto;
    }

    .rok-drawer-close {
      background: none;
      border: none;
      color: #bea9a9;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    .rok-drawer-close:hover { color: #f3ecec; }

    .rok-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      font-family: "Segoe UI", sans-serif;
    }

    .rok-msg {
      max-width: 88%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.55;
    }

    .rok-msg-user {
      align-self: flex-end;
      background: rgba(209,75,75,0.2);
      border: 1px solid rgba(209,75,75,0.38);
      color: #f3ecec;
    }

    .rok-msg-bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      color: #decccc;
    }

    .rok-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #2b3343;
      flex-shrink: 0;
    }

    .rok-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid #3a1f24;
      border-radius: 8px;
      color: #f3ecec;
      font-size: 13px;
      padding: 8px 10px;
      font-family: "Segoe UI", sans-serif;
      outline: none;
    }

    .rok-input:focus { border-color: #d14b4b; }

    .rok-send {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #562a2a;
      background: linear-gradient(135deg, #cb2d2d 0%, #931717 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Segoe UI", sans-serif;
    }

    .rok-send:hover { filter: brightness(1.1); }
  </style>
</head>
<body>

  <header class="desmos-topbar">
    <div class="desmos-topbar-left">
      <span class="desmos-topbar-folder-icon">&#x1F4C2;</span>
      <div class="desmos-topbar-divider"></div>
      <input class="desmos-topbar-title" type="text" value="Untitled Graph" spellcheck="false" />
      <button class="desmos-topbar-save" type="button">Save</button>
    </div>

    <div class="desmos-topbar-center">desmos</div>

    <div class="desmos-topbar-right">
      <button class="desmos-topbar-login" type="button">Log In</button>
      <button class="desmos-topbar-signup" type="button">Sign Up</button>
      <div class="desmos-topbar-icons">
        <span class="desmos-topbar-icon" title="Share">&#x2197;</span>
        <span class="desmos-topbar-icon" title="Help">&#x3F;</span>
        <span class="desmos-topbar-icon" title="Language">&#x1F310;</span>
        <span class="desmos-topbar-icon" title="Accessibility" style="color:#4caf50;">&#x2713;</span>
      </div>
    </div>
  </header>

  <div id="desmosContainer"></div>

  <!-- Secret button - nearly invisible until hovered -->
  <button class="rok-secret-btn" id="rokSecretBtn" type="button">rok</button>

  <!-- ROK chat drawer -->
  <div class="rok-chat-drawer" id="rokDrawer" hidden>
    <div class="rok-drawer-header">
      <span class="rok-drawer-title">
        <img src="roklogo.png" alt="ROK" />
        Ask ROK
      </span>
      <button class="rok-drawer-close" id="rokDrawerClose" type="button">&times;</button>
    </div>
    <div class="rok-msgs" id="rokMsgs"></div>
    <div class="rok-input-row">
      <input class="rok-input" id="rokInput" type="text" placeholder="Ask a math question..." autocomplete="off" />
      <button class="rok-send" id="rokSend" type="button">Ask</button>
    </div>
  </div>

  <script>
    function resizeDesmos() {
      const el = document.getElementById("desmosContainer");
      if (el) {
        el.style.width = window.innerWidth + "px";
        el.style.height = (window.innerHeight - 40) + "px";
      }
    }

    // Init Desmos - light theme, full features, looks exactly like desmos.com
    let calculator = null;
    window.addEventListener("DOMContentLoaded", () => {
      const el = document.getElementById("desmosContainer");
      resizeDesmos();
      if (typeof Desmos !== "undefined" && el) {
        calculator = Desmos.GraphingCalculator(el, {
          keypad: true,
          expressions: true,
          settingsMenu: true,
          zoomButtons: true,
          border: false,
          lockViewport: false
        });
      }
    });
    window.addEventListener("resize", resizeDesmos);

    // Secret button toggle
    const secretBtn = document.getElementById("rokSecretBtn");
    const drawer = document.getElementById("rokDrawer");
    const closeBtn = document.getElementById("rokDrawerClose");
    const msgs = document.getElementById("rokMsgs");
    const input = document.getElementById("rokInput");
    const sendBtn = document.getElementById("rokSend");
    let open = false;

    function toggleDrawer(next) {
      open = next;
      drawer.hidden = !open;
      secretBtn.classList.toggle("is-active", open);
      if (open) input.focus();
    }

    secretBtn.addEventListener("click", () => toggleDrawer(!open));
    closeBtn.addEventListener("click", () => toggleDrawer(false));

    async function sendMsg() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";

      const userEl = document.createElement("div");
      userEl.className = "rok-msg rok-msg-user";
      userEl.textContent = text;
      msgs.appendChild(userEl);

      const botEl = document.createElement("div");
      botEl.className = "rok-msg rok-msg-bot";
      botEl.textContent = "Thinking...";
      msgs.appendChild(botEl);
      msgs.scrollTop = msgs.scrollHeight;

      try {
        const prompt = `You are a math assistant inside a Desmos graphing calculator. The user asked: "${text}"\n\nRespond helpfully and concisely. If the question involves an equation or function that can be graphed, end your response with a line that says exactly: GRAPH: followed by the Desmos LaTeX expression (e.g. GRAPH: y=x^2). Only one GRAPH line if relevant.`;

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: prompt,
            history: [],
            model: "qwen3:8b",
            max_tokens: 400,
            enable_thinking: false
          })
        });

        const contentType = (res.headers.get("content-type") || "").toLowerCase();
        let reply = "";

        if (res.body && res.body.getReader) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          const isSSE = contentType.includes("text/event-stream");
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            if (isSSE) {
              for (const line of chunk.split("\n")) {
                if (!line.startsWith("data:")) continue;
                const data = line.slice(5).trim();
                if (data === "[DONE]") break;
                try {
                  const parsed = JSON.parse(data);
                  reply += parsed.token || parsed.response || parsed.text || "";
                } catch { reply += data; }
              }
            } else {
              reply += chunk;
            }
          }
        } else {
          reply = await res.text();
        }

        const graphMatch = reply.match(/GRAPH:\s*(.+)/i);
        if (graphMatch && calculator) {
          const latex = graphMatch[1].trim();
          calculator.setExpression({ id: "g" + Date.now(), latex, color: "#2d70b3" });
          const note = document.createElement("div");
          note.className = "rok-msg rok-msg-bot";
          note.textContent = "Graphed: " + latex;
          msgs.appendChild(note);
        }

        botEl.textContent = reply.replace(/GRAPH:\s*.+/i, "").trim() || "Done! Check the graph.";
        msgs.scrollTop = msgs.scrollHeight;
      } catch (err) {
        botEl.textContent = "Error: " + err.message;
      }
    }

    sendBtn.addEventListener("click", sendMsg);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMsg(); });
  </script>
</body>
</html>
