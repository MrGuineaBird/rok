<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROK Games</title>
  <link rel="stylesheet" href="games.css?v=1" />
</head>
<body>
  <div class="rg-root">
    <header class="rg-header">
      <a class="rg-back" href="../index.html">← ROK Home</a>
      <h1 class="rg-title">ROK Games</h1>
      <p class="rg-tagline">Play with your ROK backend — more titles landing here.</p>
    </header>

    <main class="rg-main">
      <ul class="rg-grid" role="list">
        <li class="rg-card">
          <a class="rg-card-link" href="pictionary.html">
            <span class="rg-card-kicker">Drawing</span>
            <span class="rg-card-name">ROK Pictionary</span>
            <span class="rg-card-desc">Draw from an AI prompt on the clock; vision model judges your sketch.</span>
          </a>
        </li>
      </ul>
    </main>

    <footer class="rg-footer">
      <span>Powered by ROK · Ollama Cloud</span>
    </footer>
  </div>
</body>
</html>

<script>
  if (window.top !== window.self) {
    document.body.innerHTML = `
      <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      ">
        <p style="font-size: 24px;">
        Embedding of this website is not allowed.
          Please use the verified link of 
          <a href="${window.self.location.href}" target="_blank">
            ${window.self.location.href}
          </a>
        </p>
      </div>
    `;
  }
</script>
